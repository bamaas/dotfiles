# External git repos chezmoi clones into $HOME on `apply` (mac + Linux/containers).
# Sourced from ~/.zshrc. refreshPeriod avoids hitting the network every apply.

[".local/share/zsh/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"

[".local/share/zsh/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    refreshPeriod = "168h"

# Claude Code skills from github.com/mattpocock/skills (skills.sh).
# Archive externals: each entry extracts one skill dir into ~/.claude/skills/.
# stripComponents=4 drops "skills-main/skills/<category>/<name>" from paths.

[".claude/skills/grill-me"]
    type = "archive"
    url = "https://github.com/mattpocock/skills/archive/main.tar.gz"
    exact = true
    stripComponents = 4
    include = ["*/skills/productivity/grill-me/**"]
    refreshPeriod = "168h"

