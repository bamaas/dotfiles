# External git repos chezmoi clones into $HOME on `apply` (mac + Linux/containers).
# Sourced from ~/.zshrc. refreshPeriod avoids hitting the network every apply.

[".local/share/zsh/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"

[".local/share/zsh/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    refreshPeriod = "168h"
